apiVersion: apps/v1
kind: Deployment
metadata:
  name: swamp
  labels:
    app: swamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swamp
  template:
    metadata:
      labels:
        app: swamp
    spec:
      containers:
        - name: swamp
          image: ghcr.io/bbockelm/swamp:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: swamp-secrets
                  key: database-url
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: swamp-config
                  key: s3-endpoint
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: swamp-config
                  key: s3-bucket
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: swamp-secrets
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: swamp-secrets
                  key: s3-secret-key
            - name: S3_USE_SSL
              value: "true"
            - name: S3_USE_PATH_STYLE
              value: "true"
            - name: APP_ENV
              value: "production"
            - name: APP_PORT
              value: "8080"
            - name: INSTANCE_KEY
              valueFrom:
                secretKeyRef:
                  name: swamp-secrets
                  key: instance-key
            - name: OIDC_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: swamp-config
                  key: oidc-issuer
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: swamp-secrets
                  key: oidc-client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: swamp-secrets
                  key: oidc-client-secret
            - name: AGENT_BINARY
              value: "claude"
            - name: AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: swamp-secrets
                  key: agent-api-key
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: swamp-data
              mountPath: /app/.swamp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: swamp-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: swamp
spec:
  selector:
    app: swamp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: swamp-config
data:
  s3-endpoint: "https://s3.amazonaws.com"
  s3-bucket: "swamp-artifacts"
  oidc-issuer: "https://cilogon.org"
