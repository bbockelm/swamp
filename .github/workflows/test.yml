name: Test

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swamp
          POSTGRES_PASSWORD: swamp
          POSTGRES_DB: swamp
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U swamp"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://swamp:swamp@localhost:5432/swamp?sslmode=disable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        run: make migrate

      - name: Run tests
        run: go test -race ./...
