name: Build and Push Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: hub.opensciencegrid.org
  IMAGE_NAME: brian_bockelman/swamp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Deployment
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate image tags and version
        id: tag
        run: |
          GIT_COMMIT=$(git rev-parse --short HEAD)
          echo "commit=${GIT_COMMIT}" >> $GITHUB_OUTPUT

          TAGS=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push: use the version tag (e.g. v0.1.0) and latest
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${REGISTRY}/${IMAGE_NAME}:${VERSION}"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:latest"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          else
            # Branch push: use dev-<timestamp>
            TIMESTAMP=$(date +%s)
            TAGS="${REGISTRY}/${IMAGE_NAME}:dev-${TIMESTAMP}"
            GIT_VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
            echo "version=${GIT_VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Image tags: ${TAGS}"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          build-args: |
            VERSION=${{ steps.tag.outputs.version }}
            COMMIT=${{ steps.tag.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
